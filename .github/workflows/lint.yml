name: Lint

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8
        run: |
          flake8 . --extend-ignore=B008

      - name: Run isort
        run: |
          isort . --profile black

      - name: Run black
        run: |
          black .

      - name: Run mypy
        run: |
          mypy .
